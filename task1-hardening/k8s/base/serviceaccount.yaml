apiVersion: v1
kind: ServiceAccount
metadata:
  name: ledger-api-sa
  namespace: payments
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ledger-api-role
  namespace: payments
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["ledger-api-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ledger-api-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ledger-api-rolebinding
  namespace: payments
subjects:
  - kind: ServiceAccount
    name: ledger-api-sa
    namespace: payments
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: ledger-api-role